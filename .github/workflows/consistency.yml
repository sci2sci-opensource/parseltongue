name: Consistency

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  self-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run self-validation
        id: self-validation
        run: python -m parseltongue load_main parseltongue.pltg
        continue-on-error: true

      - name: Warn on self-validation failure
        if: steps.self-validation.outcome == 'failure'
        run: echo "::warning::Self-validation failed — parseltongue.pltg did not load cleanly"

      - name: Run consistency tests
        id: consistency
        run: python -m pytest parseltongue/core/tests/test_parseltongue_core_consistency.py -v 2>&1 | tee consistency.log
        continue-on-error: true

      - name: Warn on consistency failures
        if: steps.consistency.outcome == 'failure'
        run: |
          echo "::warning::Consistency tests have failures (xfail or otherwise) — see log for details"
          grep -E "FAILED|XFAIL|xfail" consistency.log | while read line; do
            echo "::warning::$line"
          done
